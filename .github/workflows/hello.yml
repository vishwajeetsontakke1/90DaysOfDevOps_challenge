# This is the Workflow
name: Hello Workflow

# runs on trigger
on:
  push:
    branches: [main]
    paths:
      '-**.html'

# these are the Jobs inside the workflow
jobs:
  # this is the name of the job
  greet:
    # This is github runner, each job runs on runner
    runs-on: ubuntu-latest

    steps:
      - name: Say hello to users
        run: echo "Hello World"

      - name: Say hello to user name
        run: echo "hello $USER"
  details: 
    runs-on: ubuntu-latest
    steps:
      - name: version of docker, python etc 
        run: docker --version && python --version
      
      
